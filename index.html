<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">

<style>
  :root{color-scheme:dark;
    --page:#0d0d0d; --surface:#1a1a19; --surface2:#222220;
    --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --baseline:#383835; --ring:rgba(255,255,255,.10);
    --accent:#3987e5; --accent2:#86b6ef; --gold:#c98500; --goldbright:#fab219;
    --good:#0ca30c; --bad:#e66767; --warn:#ec835a;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--page);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.5}
  .wrap{max-width:720px;margin:0 auto;padding:16px 16px 60px}
  a{color:var(--accent2);text-decoration:none}
  header.top{display:flex;align-items:center;justify-content:space-between;padding:10px 0 4px}
  .brand{font-weight:800;font-size:18px;letter-spacing:-.01em}
  .brand .sub{display:block;font-size:10px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;font-weight:700}
  .who{font-size:12px;color:var(--muted);text-align:right}
  .who b{color:var(--ink2)}
  .who button{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;text-decoration:underline}
  nav.tabs{display:flex;gap:4px;margin:12px 0 20px;border-bottom:1px solid var(--grid);padding-bottom:10px;flex-wrap:wrap}
  .tab{font-size:13px;color:var(--muted);padding:7px 13px;border-radius:999px;border:1px solid transparent;cursor:pointer;background:none}
  .tab.on{color:var(--ink);background:var(--surface);border-color:var(--ring);font-weight:700}
  .tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--goldbright);margin-left:5px;vertical-align:1px}
  .tab.urgent{background:var(--gold);color:#140f02;border-color:var(--gold);font-weight:800;animation:tabpulse 1.6s ease-in-out infinite}
  .tab.urgent.on{background:var(--goldbright);border-color:var(--goldbright)}
  @keyframes tabpulse{0%,100%{box-shadow:0 0 0 0 rgba(250,178,25,.45)}50%{box-shadow:0 0 0 8px rgba(250,178,25,0)}}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.18em;color:var(--ink2);margin:24px 0 10px;font-weight:700}
  .card{background:var(--surface);border:1px solid var(--ring);border-radius:14px;padding:16px;margin-bottom:12px}
  .card h3{font-size:15px;margin-bottom:4px}
  .meta{font-size:11.5px;color:var(--muted)}
  .body-md{font-size:14px;color:var(--ink2);margin-top:8px;line-height:1.7}
  .body-md p{margin:9px 0}
  .body-md .li{padding:5px 0 5px 20px;position:relative}
  .body-md .li::before{content:'•';position:absolute;left:5px;color:var(--gold);font-weight:800}
  .body-md b{color:var(--ink)}
  .btn{display:inline-block;padding:8px 16px;border-radius:10px;border:1px solid var(--ring);background:var(--surface2);color:var(--ink);font-size:13px;font-weight:700;cursor:pointer}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.gold{background:var(--gold);border-color:var(--gold);color:#140f02}
  .btn.ghost{background:none;color:var(--ink2)}
  .btn.sm{padding:4px 10px;font-size:12px;font-weight:600}
  .btn:disabled{opacity:.45;cursor:default}
  .btn.danger{background:var(--bad);border-color:var(--bad);color:#2a0808}
  .pickrow{display:flex;gap:8px;margin-top:12px}
  .pick{flex:1;text-align:left;background:var(--surface2);border:1px solid var(--ring);border-radius:12px;padding:10px 12px;cursor:pointer;color:var(--ink2);font-family:inherit}
  .pick b{display:block;color:var(--ink);font-size:13.5px}
  .pick span{font-size:11px;color:var(--muted);line-height:1.35;display:block;margin-top:2px}
  .pick.on{border-color:var(--gold);background:rgba(201,133,0,.12)}
  .pick.on b{color:var(--goldbright)}
  .rankopt{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:var(--surface2);border:1px solid var(--ring);border-radius:12px;padding:11px 13px;cursor:pointer;color:var(--ink);font-size:14px;font-family:inherit;margin-top:8px}
  .rankopt .rk{display:inline-flex;width:26px;height:26px;border-radius:50%;border:1px solid var(--ring);align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--muted);flex:none}
  .rankopt.on{border-color:var(--gold);background:rgba(201,133,0,.1)}
  .rankopt.on .rk{background:var(--gold);color:#140f02;border-color:var(--gold)}
  .tour-card{max-width:440px;margin:5vh auto 0;text-align:center;background:var(--surface);border:1px solid var(--ring);border-radius:18px;padding:30px 24px}
  .tour-ico{font-size:44px}
  .tour-card h1{font-size:22px;margin:10px 0 4px}
  .tour-card .body-md{text-align:left}
  .tour-dots{margin:18px 0 8px}
  .tour-dots span{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--baseline);margin:0 3px}
  .tour-dots span.on{background:var(--goldbright)}
  input,textarea,select{width:100%;background:var(--surface2);border:1px solid var(--ring);border-radius:10px;color:var(--ink);padding:10px 12px;font-size:14px;font-family:inherit;margin-top:8px}
  textarea{min-height:80px;resize:vertical}
  label{font-size:12px;color:var(--muted);display:block;margin-top:12px}
  .err{color:var(--bad);font-size:12.5px;margin-top:8px}
  .ok{color:var(--good);font-size:12.5px;margin-top:8px}
  .pill{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;border-radius:6px;padding:2px 7px;border:1px solid var(--ring);color:var(--ink2);background:var(--surface2);margin-left:6px;vertical-align:1px}
  .pill.gold{color:var(--goldbright);border-color:rgba(201,133,0,.45);background:rgba(201,133,0,.12)}
  .pill.green{color:var(--good);border-color:rgba(12,163,12,.4);background:rgba(12,163,12,.1)}
  .pill.red{color:var(--bad);border-color:rgba(230,103,103,.4);background:rgba(230,103,103,.08)}
  .pill.blue{color:var(--accent2);border-color:rgba(57,135,229,.4);background:rgba(57,135,229,.1)}
  .likebtn{background:none;border:1px solid var(--ring);border-radius:999px;color:var(--ink2);font-size:12px;padding:3px 11px;cursor:pointer}
  .likebtn.liked{color:var(--goldbright);border-color:rgba(201,133,0,.5);background:rgba(201,133,0,.1)}
  .thread{margin-top:12px;border-top:1px solid var(--grid);padding-top:10px}
  .prop{margin-top:10px;padding:12px 12px 10px;border:1px solid var(--grid);border-radius:12px;background:var(--surface2)}
  .prop .ptext{font-size:14px;font-weight:700;color:var(--ink)}
  .prop .thread{border-top:1px solid var(--grid)}
  .threadlbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;font-weight:700}
  .cmt{padding:7px 0;font-size:13px;color:var(--ink2);border-bottom:1px solid var(--grid)}
  .cmt:last-child{border:none}
  .cmt b{color:var(--ink)}
  .cmt .meta{margin-left:6px}
  .cdel{float:right;background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:0 4px;line-height:1}
  .cdel:hover{color:var(--bad)}
  .composer{display:flex;gap:8px;margin-top:10px;align-items:stretch}
  .composer input{margin-top:0;flex:1}
  .composer .btn{white-space:nowrap}
  .voterow{display:flex;gap:8px;margin-top:12px}
  .voterow .btn{flex:1;text-align:center}
  .voterow .btn.sel-yes{background:var(--good);border-color:var(--good);color:#04210b}
  .voterow .btn.sel-no{background:var(--bad);border-color:var(--bad);color:#2a0808}
  .voterow .btn.sel-abstain{background:var(--baseline);border-color:var(--baseline)}
  .chips{margin-top:10px;font-size:11.5px;color:var(--muted)}
  .chips .c{display:inline-block;background:var(--surface2);border:1px solid var(--ring);border-radius:999px;padding:1px 9px;margin:2px 2px 0 0;color:var(--ink2)}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);text-align:left;padding:4px 8px 6px;border-bottom:1px solid var(--grid)}
  td{padding:6px 8px;border-bottom:1px solid var(--grid);color:var(--ink2)}
  tr:last-child td{border:none}
  td.num{font-variant-numeric:tabular-nums;text-align:right}
  .tally{display:flex;gap:10px;margin-top:10px;font-size:13px}
  .tally b{font-size:18px;display:block}
  .tally>div{flex:1;text-align:center;background:var(--surface2);border:1px solid var(--ring);border-radius:10px;padding:8px}
  .overlay{position:fixed;inset:0;background:rgba(6,6,6,.93);z-index:50;overflow-y:auto;padding:30px 16px}
  .overlay .inner{max-width:600px;margin:0 auto}
  .overlay h1{font-size:22px;margin-bottom:4px}
  .champ-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:stretch}
  .champ{flex:1;min-width:120px;background:var(--surface2);border:1px solid var(--ring);border-radius:10px;padding:10px;text-align:center}
  .champ .yr{font-size:10.5px;color:var(--muted);letter-spacing:.12em}
  .champ .nm{font-weight:800;margin-top:2px}
  .champ .tm{font-size:11px;color:var(--muted)}
  .champ.reign{flex:1.6;min-width:170px;border-color:rgba(201,133,0,.6);background:linear-gradient(180deg,rgba(201,133,0,.16),var(--surface2));padding:14px 10px}
  .champ.reign .nm{font-size:17px;color:var(--goldbright)}
  .crown{font-size:9.5px;color:var(--goldbright);letter-spacing:.18em;font-weight:800;margin-bottom:3px}
  .bless{background:rgba(201,133,0,.13);border:1px solid rgba(201,133,0,.5);color:var(--goldbright);border-radius:999px;padding:8px 18px;font-size:13.5px;font-weight:800;cursor:pointer}
  .bless.given{background:var(--gold);color:#140f02;border-color:var(--gold)}
  .backbtn{display:inline-block;margin-bottom:12px;font-size:13px;color:var(--ink2);background:var(--surface);border:1px solid var(--ring);border-radius:999px;padding:6px 14px;cursor:pointer}
  .voterow2{display:flex;gap:10px;margin-top:16px}
  .voterow2 .btn{flex:1;text-align:center;padding:14px;font-size:15px}
  .voterow2 .btn.sel-yes{background:var(--good);border-color:var(--good);color:#04210b}
  .voterow2 .btn.sel-no{background:var(--bad);border-color:var(--bad);color:#2a0808}
  .gatebar{background:rgba(201,133,0,.12);border:1px solid rgba(201,133,0,.4);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--goldbright);margin-bottom:14px;text-align:center}
  .hero{background:linear-gradient(180deg,var(--surface),var(--page));border:1px solid var(--ring);border-radius:16px;padding:22px;text-align:center;margin-bottom:14px}
  .hero .big{font-size:26px;font-weight:800}
  .hero .sub{color:var(--ink2);font-size:13.5px;margin-top:4px}
  .auth-box{max-width:380px;margin:30px auto}
  .signin-cta{text-align:center;padding:26px}
  .avatar{display:inline-flex;width:30px;height:30px;border-radius:50%;background:var(--gold);color:#140f02;font-weight:800;align-items:center;justify-content:center;font-size:14px}
  .pchip{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--ring);border-radius:999px;padding:5px 12px 5px 6px;cursor:pointer;color:var(--ink);font-size:13px;font-weight:700}
  .pmenu{position:absolute;right:0;top:44px;background:var(--surface);border:1px solid var(--ring);border-radius:14px;padding:14px;width:260px;z-index:60;text-align:left;box-shadow:0 10px 30px rgba(0,0,0,.55)}
  .who-wrap{position:relative}
  .modal-card{background:var(--surface);border:1px solid var(--ring);border-radius:16px;padding:20px;max-width:380px;margin:8vh auto 0}
  .rules-toc{font-size:13px;column-count:2;margin-bottom:6px}
  .rules-toc a{display:block;padding:2px 0;color:var(--ink2)}
  .amend{font-size:11px;color:var(--goldbright);margin-top:6px}
  .tagline{font-size:13.5px;color:var(--goldbright);font-style:italic;margin-top:3px}
  footer{margin-top:34px;text-align:center;font-size:11px;color:var(--muted);border-top:1px solid var(--grid);padding-top:14px}
  .loading{color:var(--muted);font-size:13px;padding:20px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">The 69th Ward<span class="sub">Est. 2022 · Fantasy Football</span></div>
    <div class="who-wrap" id="who"></div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <script>
  // instant header from the shared shell cache (same key the Derby page uses) —
  // paints before any network work; the app re-renders identical markup from live state on boot.
  (function(){
    let s=null; try{ s=JSON.parse(localStorage.getItem('wardShell')||'null'); }catch(e){}
    const n=s&&s.n?String(s.n).replace(/[<>&"]/g,''):null;
    document.getElementById('who').innerHTML = n
      ? `<button class="pchip" onclick="window.toggleMenu&&toggleMenu()"><span class="avatar">${n[0]||'?'}</span>${n}${s.c?' <span class="pill gold" style="margin-left:2px">C</span>':''}</button>`
      : `<button class="btn sm primary" onclick="window.openLogin&&openLogin('in')">Sign in</button>`;
    const showDerby = new Date() < new Date('2026-09-03T00:00:00-06:00');  // keep in sync with DERBY_HIDE
    const cur=(location.hash.slice(1).split('/')[0])||'home';
    const t=(k,l)=>`<a class="tab${cur===k?' on':''}" href="#${k}">${l}</a>`;
    document.getElementById('tabs').innerHTML =
      t('home','Home') + (showDerby?`<a class="tab" href="derby/">Draft Derby</a>`:'') + t('proposals','Proposals')
      + (n&&s.p>0?`<a class="tab urgent${cur==='vote'?' on':''}" href="#vote">🗳️ Vote · ${s.p}</a>`:t('vote','Vote'))
      + t('rules','Commandments') + t('history','Church History');
  })();
  </script>
  <main id="main"><div class="loading">Loading…</div></main>
  <footer>The 69th Ward · Buy-in $20 + $2/loss · Playoff loser eats the herring 🐟</footer>
</div>
<div id="overlay"></div>
<div id="modal"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB = supabase.createClient('https://wdfkzkkcyhzrbmipgiil.supabase.co','sb_publishable_YKSRpVgAy4xL64CRzGnRyw_kf4SkX1m');
const $ = id => document.getElementById(id);
const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtD = ts => new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
const md = s => esc(s).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/\*([^*\n]+)\*/g,'<i>$1</i>')
  .split('\n').map(l=>{ const m=l.match(/^\s*- (.*)$/); return m?`<div class="li">${m[1]}</div>`:(l.trim()?`<p>${l}</p>`:''); }).join('');

let session=null, me=null, members=[], TAB='home', TARGET=null, pendingVotes=[];
const DRAFT = new Date('2026-09-02T18:30:00-06:00');
const SEASON_START = new Date('2026-09-09T00:00:00-06:00');
const DERBY_HIDE = (()=>{const d=new Date(DRAFT); d.setHours(0,0,0,0); d.setDate(d.getDate()+1); return d;})();  // menu drops the day after the draft
const name = e => (members.find(m=>m.email===e)||{}).name || (e||'').split('@')[0];

// ---------- boot ----------
const TABS = [['home','Home'],['derby','Draft Derby'],['proposals','Proposals'],['vote','Vote'],['rules','Commandments'],['history','Church History']];
const ROM = ['','I','II','III','IV','V','VI','VII','VIII','IX','X'];
let TH = {member_count:12, regular_needed:7, sacred_needed:9};
function drawTabs(){
  $('tabs').innerHTML = TABS.filter(([k])=>k!=='derby'||new Date()<DERBY_HIDE).map(([k,l])=>{
    if(k==='derby') return `<a class="tab" href="derby/">${l}</a>`;
    if(k==='vote'&&pendingVotes.length) return `<button class="tab urgent${TAB===k?' on':''}" onclick="go('vote')">🗳️ Vote · ${pendingVotes.length}</button>`;
    return `<button class="tab${TAB===k?' on':''}" onclick="go('${k}')">${l}</button>`;
  }).join('');
}
function go(t){ TAB=t; TARGET=null; location.hash=t; render(); }
function parseHash(){ const p=location.hash.slice(1).split('/'); if(TABS.some(([k])=>k===p[0])){ TAB=p[0]; TARGET=p[1]||null; return true; } return false; }
window.addEventListener('hashchange',()=>{ if(parseHash()) render(); });
function focusTarget(prefix){
  if(!TARGET) return; const t=TARGET;
  setTimeout(()=>{
    const el=$(prefix+'-'+t);
    if(!el || !el.isConnected) return;   // a competing render replaced the DOM; the next pass will land it
    el.scrollIntoView({behavior:'auto',block:'start'});
    el.style.outline='2px solid var(--goldbright)'; el.style.outlineOffset='3px';
    setTimeout(()=>el.style.outline='',2600);
    TARGET=null;
  },150);
}
function copyLink(path){
  const u=location.origin+location.pathname+'#'+path;
  (navigator.clipboard?navigator.clipboard.writeText(u):Promise.reject()).then(()=>toast('Link copied 🔗'),()=>showLink(u));
}
async function shareLink(btn,path){
  const u=location.origin+location.pathname+'#'+path;
  const t=(btn&&btn.dataset&&btn.dataset.st)||'The 69th Ward';
  if(navigator.share){
    try{ await navigator.share({title:'The 69th Ward', text:t, url:u}); return; }
    catch(e){ if(e&&e.name==='AbortError') return; }
  }
  copyLink(path);
}
function toast(t,ms){ const d=document.createElement('div'); d.textContent=t;
  d.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--ring);border-radius:999px;padding:8px 18px;font-size:13px;z-index:99;color:var(--ink)';
  document.body.appendChild(d); setTimeout(()=>d.remove(),ms||1800); }

// ---------- integrated dialogs (no browser popups) ----------
let _confirmResolve=null;
function wardConfirm(o){
  return new Promise(res=>{
    _confirmResolve=res;
    $('modal').innerHTML=`<div class="overlay" onclick="if(event.target===this)_resolveConfirm(false)"><div class="inner"><div class="modal-card">
      <h3>${o.title}</h3>
      ${o.body?`<div class="body-md" style="margin-top:6px">${o.body}</div>`:''}
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn ${o.okClass||'primary'}" onclick="_resolveConfirm(true)">${o.ok||'Confirm'}</button>
        <button class="btn ghost" onclick="_resolveConfirm(false)">${o.cancel||'Cancel'}</button>
      </div></div></div></div>`;
  });
}
function _resolveConfirm(v){ $('modal').innerHTML=''; const r=_confirmResolve; _confirmResolve=null; if(r) r(v); }
function showLink(u){
  $('modal').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeLogin()"><div class="inner"><div class="modal-card">
    <h3>Copy this link</h3>
    <input id="lk-in" readonly value="${u}" onclick="this.select()">
    <div style="margin-top:14px"><button class="btn primary" onclick="closeLogin()">Done</button></div>
  </div></div></div>`;
  setTimeout(()=>{const i=$('lk-in'); i.focus(); i.select();},50);
}

async function boot(){
  parseHash();
  const {data:{session:s}} = await SB.auth.getSession(); session=s;
  SB.auth.onAuthStateChange((ev,s2)=>{
    if(ev!=='SIGNED_IN' && ev!=='SIGNED_OUT' && ev!=='USER_UPDATED') return;  // ignore INITIAL_SESSION/TOKEN_REFRESHED (boot renders once; refreshes must not re-render mid-use)
    session=s2; refreshMe().then(render);
  });
  await refreshMe();
  render();
  if(new URLSearchParams(location.search).has('signin') && !session){
    history.replaceState(null,'',location.pathname+location.hash);
    openLogin('in');
  }
}
async function refreshMe(){
  // Builds into locals, swaps shared state at the END — an in-flight render must never
  // see me/members half-cleared (that race threw "null is not an object (me.is_commissioner)").
  try{ const {data:th} = await SB.rpc('ward_thresholds'); if(th&&th[0]) TH=th[0]; }catch(e){}
  if(!session){ me=null; members=[]; pendingVotes=[]; try{ localStorage.removeItem('wardShell'); }catch(e){} return; }
  const {data:mem} = await SB.from('ward_members').select('*');
  if(!mem) return;   // transient fetch failure (token refresh moment, flaky signal): keep last known state
  const uem = (session.user.email||'').toLowerCase();
  const sm = uem.match(/^w(\d+)@69thward\.app$/);
  const me2 = mem.find(m => sm ? m.phone===sm[1] : (m.email===uem || (m.contact_email||'').toLowerCase()===uem)) || null;
  let pending2 = [];
  if(me2){
    const {data:open} = await SB.from('ward_measures').select('id,title').eq('status','open');

function normPhone(v){ let d=(v||'').replace(/\D/g,''); if(d.length===10) d='1'+d; return d; }
const maskEm = e => e ? e.replace(/^(.).*(@.*)$/, '$1•••$2') : '';
function openLogin(mode){

async function doAuth(ev,mode){
  ev.preventDefault();
  const d=normPhone($('a-ph').value), pw=$('a-pw').value;
  const msg=$('a-msg');
  if(d.length!==11){ msg.innerHTML='<div class="err">That doesn’t look like a full phone number.</div>'; return false; }
  msg.innerHTML='<div class="meta">Working…</div>';
  let r;
  if(mode==='up'){
    const cem=$('a-cem').value.trim().toLowerCase();
    r = await SB.auth.signUp({email:cem,password:pw,options:{data:{app:'ward',contact_email:cem,phone_digits:d}}});
    if(!r.error && !r.data.session) r = await SB.auth.signInWithPassword({email:cem,password:pw});
  } else {
    const {data:em} = await SB.rpc('ward_login_email',{d});
    if(!em){ msg.innerHTML='<div class="err">No account for that number yet — hit Sign up. (Or ask the commissioner.)</div>'; return false; }
    r = await SB.auth.signInWithPassword({email:em,password:pw});
  }
  if(r.error){
    let m = r.error.message;
    if(/Invalid login credentials/i.test(m)) m = 'Wrong password for that number. Try again, or use Forgot password.';
    if(/already registered/i.test(m)) m = 'That email already has an account — sign in instead.';
    msg.innerHTML=`<div class="err">${esc(m)}</div>`; return false;
  }
  closeLogin();
  return false;
}
async function forgotPw(){
  const d=normPhone($('a-ph').value), msg=$('a-msg');
  if(d.length!==11){ msg.innerHTML='<div class="err">Enter your phone number first, then hit Forgot password.</div>'; return; }
  const {data:em} = await SB.rpc('ward_login_email',{d});
  if(!em){ msg.innerHTML='<div class="err">No account for that number yet — nothing to reset. Hit Sign up.</div>'; return; }
  const {error} = await SB.auth.resetPasswordForEmail(em,{redirectTo:'https://payton10.github.io/69thward/'});
  msg.innerHTML = error ? `<div class="err">${esc(error.message)}</div>`
    : `<div class="ok">Reset link sent to ${esc(maskEm(em))} — check that inbox, tap the link, and you’ll set a new password right here.</div>`;
}

async function editDraft(id){

function mcDirty(){
  mcSnap();
  const el=$('mc-saved'); if(el) el.textContent='saving…';

  MCTIMER=setTimeout(()=>mcSave(),900);
}
async function mcSave(){
  if(!MC||!MC.id) return;
  const opts=MC.kind==='ranked'?MC.opts.map(o=>o.trim()).filter(Boolean):[];
  const days=Math.max(1,Math.min(30,parseInt(MC.days,10)||7));
  const {error} = await SB.from('ward_measures').update({
    title:MC.title.trim(), body:MC.body, kind:MC.kind, majority:MC.maj,
    options:opts.length?opts:null, window_days:days,
    closes_at:new Date(Date.now()+days*864e5).toISOString()
  }).eq('id',MC.id).eq('status','draft');

}
async function closeComposer(published){
  if(MCTIMER){ clearTimeout(MCTIMER); MCTIMER=null; }
  if(!published && MC && MC.id){
    mcSnap();
    const empty=!MC.title.trim() && !MC.body.trim() && !MC.opts.some(o=>o.trim());
    if(empty) await SB.from('ward_measures').delete().eq('id',MC.id).eq('status','draft');
    else { await mcSave(); toast('Draft saved — find it under Drafts'); }

async function delDraft(id){

}
function mcSnap(){

function mcAddOpt(){ mcSnap(); if(MC.opts.length<8) MC.opts.push(''); mcRender(); mcSave(); }

async function mcPublish(){
  mcSnap();
  if(MCTIMER){ clearTimeout(MCTIMER); MCTIMER=null; }
  const msg=t=>{ $('mc-msg').innerHTML=`<div class="err">${esc(t)}</div>`; };
  const title=MC.title.trim();
  const days=Math.max(1,Math.min(30,parseInt(MC.days,10)||7));
  if(!title) return msg('Give it a title.');
  const upd={title, body:MC.body.trim(), kind:MC.kind, majority:MC.maj, options:null, window_days:days,
             status:'open', opens_at:new Date().toISOString(), closes_at:new Date(Date.now()+days*864e5).toISOString()};
  if(MC.kind==='ranked'){
    const opts=MC.opts.map(o=>o.trim()).filter(Boolean);
    if(opts.length<2) return msg('Ranked choice needs at least 2 options.');
    if(new Set(opts.map(o=>o.toLowerCase())).size!==opts.length) return msg('Options must all be different.');
    upd.options=opts; upd.majority='standard';
  }
  const {error} = await SB.from('ward_measures').update(upd).eq('id',MC.id);
  if(error) return msg(error.message);
  if(MC.source) await SB.from('ward_proposals').update({status:'promoted',measure_id:MC.id}).eq('id',MC.source);
  MC=null; $('modal').innerHTML='';
  toast('The vote is live 🗳️');
  render();
}

async function schedMeasure(id){
  const {data:v} = await SB.from('ward_measures').select('*').eq('id',id).single();
  if(!v){ toast('That vote is gone.'); return; }
  const reopen=v.status==='closed';
  const d=new Date(reopen?Date.now()+7*864e5:v.closes_at);
  const pad=n=>String(n).padStart(2,'0');
  const val=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  $('modal').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeLogin()"><div class="inner"><div class="modal-card">
    <h3>${reopen?'Reopen this vote':'Change the close time'}</h3>
    ${reopen?'<div class="meta" style="margin-top:4px">Reopening clears the recorded result. Ballots already cast stay, and can be changed until the new close.</div>':'<div class="meta" style="margin-top:4px">The vote closes for good when you hit "Close the vote" — this just moves the deadline.</div>'}
    <label>Closes at</label>
    <input id="sch-dt" type="datetime-local" value="${val}">
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn gold" onclick="doSched(${id},${reopen})">${reopen?'Reopen vote':'Save'}</button>
      <button class="btn ghost" onclick="closeLogin()">Cancel</button>
    </div>
    <div id="sch-msg"></div>
  </div></div></div>`;
}
async function doSched(id,reopen){
  const t=new Date($('sch-dt').value);
  if(!(t instanceof Date)||isNaN(t)||t<=new Date()){ $('sch-msg').innerHTML='<div class="err">Pick a time in the future.</div>'; return; }
  const upd={closes_at:t.toISOString()};
  if(reopen){ upd.status='open'; upd.result=null; upd.rc_rounds=null; }
  const {error} = await SB.from('ward_measures').update(upd).eq('id',id);
  if(error){ $('sch-msg').innerHTML=`<div class="err">${esc(error.message)}</div>`; return; }
  closeLogin(); toast(reopen?'Vote reopened 🗳️':'Close time updated ⏱');
  render();
}

const majPill = v => v.kind==='ranked'

const resPill = v => v.kind==='ranked'
  ? (v.result?`<span class="pill green">🏆 ${esc(v.result)}</span>`:'<span class="pill red">NO BALLOTS</span>')
  : (v.result==='passed'?'<span class="pill green">SUSTAINED</span>':'<span class="pill red">NOT SUSTAINED</span>');
function rcRounds(v){
  if(v.kind!=='ranked'||!v.rc_rounds||!v.rc_rounds.length) return '';
  return `<div class="thread"><span class="threadlbl">Instant-runoff rounds</span>`+
    v.rc_rounds.map((r,n)=>`<div class="cmt"><b>Round ${n+1}</b>${r.exhausted?`<span class="meta">${r.exhausted} ballot${r.exhausted>1?'s':''} exhausted</span>`:''}<br>

  if(!rules||!rules.length){ m.innerHTML='<div class="err">The commandments are unavailable. Pray harder.</div>'; return; }
  m.innerHTML = `<h2>The Ten Commandments</h2>
    <div class="card"><div class="rules-toc">${rules.map(r=>`<a href="#rules" onclick="document.getElementById('r-${r.id}').scrollIntoView({behavior:'smooth'})">${ROM[r.id]}. ${esc(r.title)}</a>`).join('')}</div>
    <div class="meta">Handed down at the founding, amended only by the Ward (Commandment X). The PDF era (2022–2025) is archived with the commissioner.</div></div>`
    + rules.map(r=>`<div class="card" id="r-${r.id}"><h3>${ROM[r.id]} · ${esc(r.title)}
      <button class="likebtn" style="float:right" data-st="League rules: ${esc(r.title)}" onclick="shareLink(this,'rules/${r.id}')" title="Share link">🔗</button></h3>
      ${r.tagline?`<div class="tagline">“${esc(r.tagline)}”</div>`:''}
      <div class="body-md">${md(r.body_md)}</div>
      ${r.amended_by?`<div class="amend">Amended by Measure #${r.amended_by}</div>`:''}</div>`).join('');
  focusTarget('r');
}

// ---------- HISTORY ----------
async function rHistory(m){
  const {data:seasons} = await SB.from('ward_seasons').select('*').order('year',{ascending:false});
  if(!seasons){ m.innerHTML='<div class="err">History unavailable.</div>'; return; }
  const rings={}; seasons.forEach(s=>rings[s.champion]=(rings[s.champion]||0)+1);
  m.innerHTML = `<h2>Ring count</h2><div class="champ-row">${Object.entries(rings).sort((a,b)=>b[1]-a[1]).map(([n,c])=>
      `<div class="champ"><div class="nm">${'🏆'.repeat(c)}</div><div>${esc(n)}</div></div>`).join('')}</div>`
    + seasons.map(s=>`<h2>${s.year}</h2><div class="card">
      <h3>🏆 ${esc(s.champion)} — ${esc(s.champion_team)}</h3>
      <div class="meta">🥈 ${esc(s.runner_up)} (${esc(s.runner_up_team)}) · 🥉 ${esc(s.third)} (${esc(s.third_team)}) · 🍆 ${esc(s.last_place)} (${esc(s.last_place_team)})<br>
      Regular season: ${esc(s.reg_season_champ||'—')}${s.pot?` · Pot $${s.pot}`:''}</div>
      ${s.notes?`<div class="body-md" style="margin-top:6px">${esc(s.notes)}</div>`:''}
      ${s.standings?`<table><tr><th>#</th><th>Team</th><th>Mgr</th><th style="text-align:right">W-L</th><th style="text-align:right">PF</th></tr>
        ${s.standings.map(r=>`<tr><td>${r.rank}</td><td>${esc(r.team)}</td><td>${esc(r.mgr)}</td><td class="num">${r.wl}</td><td class="num">${r.pf??''}</td></tr>`).join('')}</table>`:''}
      </div>`).join('');
}

boot();
</script>
</body>
</html>
